<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Ejemplo de condicionales</title>
    </head>
    <body>
        <button onclick="mayor();">Ejecutar</button>
        <script>
            function mayor() {
                const numero1 = 400, numero2 = 400;
                
                //esta opcion es mas eficiente para el rendimiento del procesador
                if (numero1 > numero2) {
                    console.log("El primer número es el mayor");
                } else {
                    if (numero2 > numero1) {
                        console.log("El segundo número es el mayor");
                    } else {
                        console.log("Los números son iguales");
                    }
                }

                //esta opcion tambien es valida, pero usa mas rendimiento, se recomienda mas la forma de arriba
                if (numero1 > numero2) { console.log("El primer numero es el mayor"); }
                if (numero1 == numero2) { console.log("Los numeros son iguales"); }
                if (numero1 < numero2) { console.log("El segundo numero es el mayor"); }
            }
        </script>
    </body>
</html>
